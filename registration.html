        <div class="container text-center mt-5">

            <h2>Create Your Account</h2>
            <form action="confirmation.html">
            <label class="form-label mt-2">First Name:</label>
            <input type="text" class="form-control" required>

            <label class="form-label mt-2">Last Name:</label>
            <input type="text" class="form-control" required>

            <label class="form-label mt-2">Age:</label>
            <input type="number" class="form-control" required>

            <label class="form-label mt-2">Contact Number:</label>
            <input type="text" class="form-control" required>

            <label class="form-label mt-2">Email:</label>
            <input type="email" class="form-control" required>

            <label class="form-label mt-2">Enter your username:</label>
            <input type="text" class="form-control" required>

            <label class="form-label mt-2">Enter your password:</label>
            <input type="password" class="form-control" required>

            <label class="form-label mt-2">Upload Avatar:</label>
            <input type="file" class="form-control">

            <button type="submit" class="btn btn-success mt-3">Register</button>
            </form>
