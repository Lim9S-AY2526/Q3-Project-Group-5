<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>eSakayMo Fare Guide</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="proj.js"></script>
</head>
<body>

<!-- Navigation Bar -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
  <div class="container-fluid">
    <a class="navbar-brand" href="#">🛵 eSakayMo</a>
    <div class="collapse navbar-collapse">
      <ul class="navbar-nav me-auto">
        <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
        <li class="nav-item"><a class="nav-link" href="#">Fare Matrix</a></li>
        <li class="nav-item"><a class="nav-link" href="#">Schedule</a></li>
        <li class="nav-item"><a class="nav-link" href="#">Help</a></li>
      </ul>
      <a class="btn btn-success me-2" href="#">Book Now</a>
      <a class="btn btn-primary" href="registration.html">Create Account</a>
    </div>
  </div>
</nav>

<!-- Main Content Box -->
<div class="container text-center mt-5">
  <div class="p-4 bg-light bg-opacity-75 rounded shadow w-50 mx-auto">
    <h1>Welcome to eSakayMo Fare Guide!</h1>
    <p><a href="#" onclick="showInstructions()">Click here for instructions</a></p>
  </div>
</div>

<!-- Fare Calculator -->
<div class="container text-center mt-4">
  <h2>Fare Matrix</h2>
  <label class="form-label">PICK-UP LOCATION (KM):</label>
  <input type="number" id="pickup" class="form-control w-25 mx-auto">

  <label class="form-label mt-2">DROP-OFF LOCATION (KM):</label>
  <input type="number" id="dropoff" class="form-control w-25 mx-auto">

  <div class="form-check mt-2">
    <input type="checkbox" id="discount" class="form-check-input">
    <label class="form-check-label">Apply Discount (Senior, PWD, Student)</label>
  </div>

  <button type="button" class="btn btn-primary mt-3" onclick="showFare()">Compute Fare</button>
  <div id="output" class="mt-3 p-3 bg-info text-dark rounded w-25 mx-auto"></div>
</div>

<!-- Footer -->
<footer class="bg-dark text-white text-center mt-5 p-3">
  Student Name | Grade & Section ©2026 | Source: metrolinemap.com
</footer>

</body>
</html>
